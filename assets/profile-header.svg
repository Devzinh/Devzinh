<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rony Gabriel profile header</title>
  <desc id="desc">Perfil profissional com animações sutis de engenharia de software: backend, sistemas e evolução contínua.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.45" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>

    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.16"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="26" fill="url(#grid)"/>

  <g opacity="0.45">
    <circle cx="1038" cy="78" r="52" fill="#22D3EE" filter="url(#glow)">
      <animate attributeName="r" values="46;56;46" dur="4.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.20;0.32;0.20" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1092" cy="240" r="65" fill="#A78BFA" filter="url(#glow)">
      <animate attributeName="r" values="58;68;58" dur="5.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.22;0.35;0.22" dur="5.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(66 44)">
    <rect width="220" height="220" rx="24" fill="url(#card)" stroke="white" stroke-opacity="0.24"/>

    <g transform="translate(28 18)">
      <circle cx="82" cy="66" r="44" fill="#E2E8F0"/>
      <circle cx="82" cy="58" r="30" fill="#CBD5E1"/>
      <path d="M38 150C44 118 62 106 82 106C102 106 120 118 126 150" fill="#CBD5E1"/>
      <rect x="21" y="144" width="122" height="38" rx="19" fill="#94A3B8" opacity="0.9"/>
    </g>

    <g transform="translate(18 178)">
      <rect x="0" y="0" width="182" height="26" rx="13" fill="#0F172A" fill-opacity="0.72"/>
      <text x="91" y="18" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Segoe UI, Inter, Arial, sans-serif">Future Software Engineer</text>
    </g>
  </g>

  <g transform="translate(318 68)">
    <text x="0" y="58" fill="white" font-size="56" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">Rony Gabriel</text>
    <text x="0" y="103" fill="#C4B5FD" font-size="27" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="500">Software Engineering Student • Backend &amp; Systems</text>

    <g transform="translate(0 128)">
      <rect x="0" y="0" width="660" height="56" rx="14" fill="#020617" fill-opacity="0.55" stroke="#A78BFA" stroke-opacity="0.45"/>
      <text x="18" y="35" fill="#E2E8F0" font-size="22" font-family="Consolas, Menlo, Monaco, monospace">$ building reliable systems...</text>
      <rect x="400" y="18" width="14" height="24" fill="#22D3EE">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g stroke="#67E8F9" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <path d="M960 96L996 96L1020 120L1064 120">
      <animate attributeName="stroke-dasharray" values="0 220;120 100;0 220" dur="3.8s" repeatCount="indefinite"/>
    </path>
    <path d="M918 132L964 132L986 154L1042 154">
      <animate attributeName="stroke-dasharray" values="0 220;132 88;0 220" dur="4.2s" repeatCount="indefinite"/>
    </path>
    <path d="M892 168L946 168L968 192L1028 192">
      <animate attributeName="stroke-dasharray" values="0 220;108 112;0 220" dur="3.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <g transform="translate(888 214)">
    <rect width="238" height="64" rx="15" fill="#020617" fill-opacity="0.58" stroke="#22D3EE" stroke-opacity="0.4"/>
    <text x="20" y="26" fill="#93C5FD" font-size="15" font-family="Consolas, monospace">status: learning + building</text>
    <text x="20" y="46" fill="#E2E8F0" font-size="15" font-family="Consolas, monospace">target_role: Software Engineer</text>
  </g>
</svg>
