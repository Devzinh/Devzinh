<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rony Gabriel profile header</title>
  <desc id="desc">Perfil profissional de futuro engenheiro de software com foco em backend, sistemas e evolução contínua.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.5" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.14"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="white" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    .softPulse { animation: pulse 4.4s ease-in-out infinite; }
    .softPulse2 { animation: pulse 5.2s ease-in-out infinite; }
    .blink { animation: blink 1.1s steps(1) infinite; }
    .flow { stroke-dasharray: 0 220; animation: flow 3.8s linear infinite; }
    .flow2 { stroke-dasharray: 0 220; animation: flow 4.4s linear infinite; }
    .flow3 { stroke-dasharray: 0 220; animation: flow 3.2s linear infinite; }

    @keyframes pulse {
      0%,100% { opacity: 0.16; transform: scale(1); }
      50% { opacity: 0.30; transform: scale(1.08); }
    }
    @keyframes blink {
      0%,49% { opacity: 1; }
      50%,100% { opacity: 0; }
    }
    @keyframes flow {
      0% { stroke-dasharray: 0 220; }
      50% { stroke-dasharray: 120 100; }
      100% { stroke-dasharray: 0 220; }
    }
    @media (prefers-reduced-motion: reduce) {
      .softPulse, .softPulse2, .blink, .flow, .flow2, .flow3 { animation: none; }
    }
  </style>

  <rect width="1200" height="320" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="26" fill="url(#grid)"/>

  <g transform="translate(74 50)">
    <rect width="230" height="220" rx="24" fill="url(#glass)" stroke="white" stroke-opacity="0.22"/>

    <circle cx="84" cy="62" r="30" fill="#E2E8F0"/>
    <path d="M34 154C39 122 58 108 84 108C110 108 129 122 134 154" fill="#CBD5E1"/>
    <rect x="20" y="150" width="128" height="36" rx="18" fill="#94A3B8"/>

    <rect x="12" y="190" width="206" height="22" rx="11" fill="#020617" fill-opacity="0.56"/>
    <text x="115" y="205" text-anchor="middle" fill="#E2E8F0" font-size="11" font-family="Segoe UI, Inter, Arial, sans-serif">Future Software Engineer</text>

    <g transform="translate(142 32)">
      <rect x="0" y="0" width="66" height="44" rx="8" fill="#0B1220" stroke="#67E8F9" stroke-opacity="0.7"/>
      <rect x="5" y="5" width="56" height="30" rx="4" fill="#111827"/>
      <path d="M-4 48H70" stroke="#67E8F9" stroke-width="4" stroke-linecap="round"/>
      <circle cx="11" cy="20" r="2" fill="#22D3EE" class="softPulse"/>
      <circle cx="19" cy="20" r="2" fill="#A78BFA" class="softPulse2"/>
    </g>
  </g>

  <g transform="translate(332 74)">
    <text x="0" y="54" fill="white" font-size="56" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">Rony Gabriel</text>
    <text x="0" y="98" fill="#C4B5FD" font-size="27" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="500">Software Engineering Student • Backend &amp; Systems</text>

    <g transform="translate(0 124)">
      <rect x="0" y="0" width="650" height="54" rx="14" fill="#020617" fill-opacity="0.56" stroke="#A78BFA" stroke-opacity="0.45"/>
      <text x="18" y="34" fill="#E2E8F0" font-size="21" font-family="Consolas, Menlo, Monaco, monospace">$ building reliable systems...</text>
      <rect x="396" y="16" width="12" height="23" fill="#22D3EE" class="blink"/>
    </g>
  </g>

  <circle cx="1036" cy="78" r="52" fill="#22D3EE" class="softPulse"/>
  <circle cx="1092" cy="242" r="62" fill="#A78BFA" class="softPulse2"/>

  <g stroke="#67E8F9" stroke-width="3" stroke-linecap="round" opacity="0.82">
    <path class="flow" d="M948 98L992 98L1018 122L1060 122"/>
    <path class="flow2" d="M910 132L958 132L983 156L1040 156"/>
    <path class="flow3" d="M885 168L941 168L965 192L1028 192"/>
  </g>

  <g transform="translate(882 214)">
    <rect width="246" height="66" rx="15" fill="#020617" fill-opacity="0.58" stroke="#22D3EE" stroke-opacity="0.4"/>
    <text x="20" y="27" fill="#93C5FD" font-size="15" font-family="Consolas, monospace">status: learning + building</text>
    <text x="20" y="48" fill="#E2E8F0" font-size="15" font-family="Consolas, monospace">target_role: Software Engineer</text>
  </g>
</svg>
